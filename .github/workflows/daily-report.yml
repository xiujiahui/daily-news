name: Daily English Report

on:
  schedule:
    # 每天早上7点半运行（UTC时间23:30，北京时间7:30）
    - cron: '30 23 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 添加必要的权限设置，用于GitHub Pages部署
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'  # 缓存pip依赖，加快安装速度
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run daily report script
        env:
          # 从GitHub Secrets读取环境变量
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python daily_english_report.py
      
      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4  # 已更新为最新版本v4
        with:
          name: daily-report-html
          path: daily_report_*.html
          retention-days: 7
      
      # 发布到GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # 上传当前目录下的所有文件，包括生成的HTML报告
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 自动生成的token，无需手动配置
